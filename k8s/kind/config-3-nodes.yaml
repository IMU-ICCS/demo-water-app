kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 31610
        hostPort: 61610
        protocol: TCP
    extraMounts:
      - hostPath: ./models
        containerPath: /mnt/host/models
      - hostPath: ./suricata-data
        containerPath: /mnt/host/suricata-data
      - hostPath: ./suricata-log-processor
        containerPath: /mnt/host/suricata-log-processor
  - role: worker
    extraMounts:
      - hostPath: ./models
        containerPath: /mnt/host/models
      - hostPath: ./suricata-data
        containerPath: /mnt/host/suricata-data
      - hostPath: ./suricata-log-processor
        containerPath: /mnt/host/suricata-log-processor
  - role: worker
    extraMounts:
      - hostPath: ./models
        containerPath: /mnt/host/models
      - hostPath: ./suricata-data
        containerPath: /mnt/host/suricata-data
      - hostPath: ./suricata-log-processor
        containerPath: /mnt/host/suricata-log-processor

containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5000"]
      endpoint = ["http://kind-registry:5000"]