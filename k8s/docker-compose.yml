
name: water_flow_demo
services:

  suricata:
    container_name: "suricata"
    image: jasonish/suricata:8.0.3
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./suricata-data/lib:/var/lib/suricata
      - ./suricata-data/etc:/etc/suricata
      - ./suricata-data/log:/var/log/suricata
    command: ["-i", "eth0"]
    #restart: "no"

  streamlit-chart:
    container_name: "streamlit-chart"
    image: ipatini/streamlit-chart
    environment:
      BROKER_HOST: host.docker.internal
      BROKER_PORT: 61610
      USERNAME: aaa
      PASSWORD: 111
      TOPIC: /topic/attack_probability_score
      TZ: Europe/Athens
    ports:
      - 8501:8501