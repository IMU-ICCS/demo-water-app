apiVersion: v1
kind: Service
metadata:
  name: {{ include "ems-server.fullname" . }}-public
  labels:
    {{- include "ems-server.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - name: stomp
      port: 61610
      targetPort: 61610
      nodePort: 31610
      protocol: TCP
  selector:
    {{- include "ems-server.selectorLabels" . | nindent 4 }}
