# Default values for ems-server.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: "ghcr.io/imu-iccs/ems-server-nebulous"
#  repository: "registry.gitlab.com/nebulous-project/ems-main/ems-server"
  pullPolicy: IfNotPresent
#  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: &image_tag "latest"
#  tag: &image_tag "experiment4"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: "ems-server-service-account"

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 8111

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 1
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

ports:
  - name: http
    containerPort: 8111
    protocol: TCP
  - name: openwire
    containerPort: 61616
    protocol: TCP
  - name: openwire-tls
    containerPort: 61617
    protocol: TCP
  - name: stomp
    containerPort: 61610
    protocol: TCP

#
# =====  Configuration passed at command line  =====
# =====    (see also: deployment.yaml file)    =====
#
app_uuid: ''
broker_address: ''
broker_port: '5672'
broker_username: ''
broker_password: ''

hostFiles:
  - enabled: true
    volumeName: models-volume
    hostPath:
      path: /mnt/host/models                        # path inside Kind node (mounted dir)
      type: Directory
    mountPath: /opt/ems-server/models/              # mount point inside container
#  - enabled: true
#    volumeName: host-share-2
#    hostPath:
#      path: /mnt/host                               # path inside Kind node (mounted dir)
#      type: Directory
#    mountPath: /tmp/test

env:
  #
  # =====  Development and Debug settings  =====
  #
  #- name: APPLICATION_ID
  #  value: ""
  #- name: METRIC_MODEL_URL
  #  value: "https://gitlab.com/nebulous-project/tests-new/-/raw/master/ems-at-nebulous/models/nebulous/test2.yml"
  - name: EMS_PRELOAD_APP_MODEL
    value: "water.yaml"

  #
  # =====  EMS server configuration  =====
  #
  # ===== INITIALIZATION settings =====
  - name: JASYPT_PASSWORD
    value: 'password'
  - name: NET_UTIL_ADDRESS_DISCOVERY_SERVICES
    value: '-'
  - name: EMS_IP_SETTING
    value: 'DEFAULT_IP'
  #- name: LOGGING_LEVEL_EU_NEBULOUS_EMS_TRANSLATE
  #  value: 'TRACE'

#  - name: TRANSLATOR_EXTENSION_MODEL
#    value: 'extension.yml'

